server:
  port: ${PORT:${SERVER_PORT:8080}}

spring:
  application:
    name: locked-in-career-center-backend
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/locked_in_career_center}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
  jwt:
    secret: ${APP_JWT_SECRET:local-dev-secret-change-before-production-locked-in-career-center}
    expiration-ms: ${APP_JWT_EXPIRATION_MS:86400000}